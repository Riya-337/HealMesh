apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: healpolicy-validator
webhooks:
  - name: validate.healpolicy.healmesh.io
    rules:
      - apiGroups: ["healmesh.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["healpolicies"]
        scope: "Namespaced"
    clientConfig:
      url: "https://host.docker.internal:8443/validate-healpolicy"
      caBundle: 
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 5
    failurePolicy: Fail
