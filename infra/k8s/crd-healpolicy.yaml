apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: healpolicies.healmesh.io
spec:
  group: healmesh.io
  names:
    kind: HealPolicy
    listKind: HealPolicyList
    plural: healpolicies
    singular: healpolicy
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                allowedActions:
                  type: array
                  items:
                    type: string
                    enum: ["SCALE", "PATCH", "REDEPLOY", "HELM_UPGRADE"]
