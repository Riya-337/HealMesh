# HealMesh — RBAC for Event Watcher (Phase 1: read-only)
# This service account has ONLY get/list/watch on pods, deployments, events.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: healmesh-watcher
  namespace: healmesh
  labels:
    app.kubernetes.io/component: watcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: healmesh-watcher
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: healmesh-watcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: healmesh-watcher
subjects:
  - kind: ServiceAccount
    name: healmesh-watcher
    namespace: healmesh
