apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.n8n.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      serviceAccountName: prism-remediator
      containers:
      - name: n8n
        image: {{ .Values.n8n.image }}
        ports:
        - containerPort: 5678
        env:
        - name: DB_TYPE
          value: {{ .Values.n8n.env.dbType }}
        - name: DB_POSTGRESDB_HOST
          value: "postgres"
        - name: DB_POSTGRESDB_PORT
          value: "5432"
        - name: DB_POSTGRESDB_DATABASE
          value: "postgres"
        - name: DB_POSTGRESDB_USER
          value: "postgres"
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: prism-secrets
              key: POSTGRES_PASSWORD
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: prism-secrets
              key: N8N_ENCRYPTION_KEY
        volumeMounts:
        - name: n8n-storage
          mountPath: /home/node/.n8n
        - name: remediation-script
          mountPath: /usr/local/bin/remediate.sh
          subPath: remediate.sh
      volumes:
      - name: n8n-storage
        persistentVolumeClaim:
          claimName: n8n-pvc
      - name: remediation-script
        configMap:
          name: remediation-script
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.n8n.serviceType }}
  ports:
  - port: 5678
    targetPort: 5678
  selector:
    app: n8n
