apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.frontend.image }}
        ports:
        - containerPort: 3000
        env:
        - name: N8N_URL
          value: "http://n8n:5678"
        - name: OPENCLAW_URL
          value: "http://openclaw:80"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.frontend.serviceType }}
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: frontend
