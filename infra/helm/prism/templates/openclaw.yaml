apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
      - name: openclaw
        image: {{ .Values.openclaw.image }}
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: prism-secrets
              key: GROQ_API_KEY
        - name: OPENCLAW_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: prism-secrets
              key: OPENCLAW_AUTH_TOKEN
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.openclaw.serviceType }}
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: openclaw
